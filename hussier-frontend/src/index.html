<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Huiisier - App</title>
        <base href="/" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="preconnect" href="https://primefaces.org" />
        <link rel="icon" type="image/x-icon" href="https://primefaces.org/cdn/primeng/images/favicon.png" />
        <link href="https://fonts.cdnfonts.com/css/lato" rel="stylesheet" />
    </head>

    <body>
        
  <style>
    #splash-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: linear-gradient(135deg, #1e3a5f 0%, #2d6a9f 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.5s ease;
    }
    #splash-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .splash-logo {
      width: 80px; height: 80px;
      background: rgba(255,255,255,0.15);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px;
      animation: pulse 2s infinite;
    }
    .splash-logo svg { width: 44px; height: 44px; fill: white; }
    .splash-title {
      color: white;
      font-size: 26px;
      font-weight: 700;
      font-family: 'Lato', sans-serif;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }
    .splash-subtitle {
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      font-family: 'Lato', sans-serif;
      margin-bottom: 40px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }
    .splash-bar {
      width: 200px; height: 3px;
      background: rgba(255,255,255,0.15);
      border-radius: 3px;
      overflow: hidden;
    }
    .splash-bar-fill {
      height: 100%;
      background: white;
      border-radius: 3px;
      animation: loading 1.8s ease-in-out infinite;
    }
    @keyframes loading {
      0% { width: 0%; margin-left: 0%; }
      50% { width: 60%; margin-left: 20%; }
      100% { width: 0%; margin-left: 100%; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
  </style>
  <div id="splash-screen">
    <div class="splash-logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div class="splash-title">Cabinet Me SAWADOGO</div>
    <div class="splash-subtitle">Huissier de Justice</div>
    <div class="splash-bar"><div class="splash-bar-fill"></div></div>
  </div>
  <script>
    window.addEventListener('load', function() {
      setTimeout(function() {
        var splash = document.getElementById('splash-screen');
        if (splash) {
          splash.classList.add('hidden');
          setTimeout(function() { splash.remove(); }, 500);
        }
      }, 800);
    });
  </script>

    <app-root></app-root>
    </body>
</html>
